<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Focado — Mediterranean bowls & wraps</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
  <img class="logo" src="focado-logo-green.png" alt="Focado" />
</header>
<main>
  <section class="hero">
    <div class="content">
      <h1 class="headline"><span class="crave">Cravinggg</span> arrives soon.</h1>
      <p class="subline">Mediterranean, everyday.</p>
    </div>
  </section>
  <section class="menu">
    <p class="eyebrow">The Menu</p>
    <h2 class="menu-title">What you'll crave</h2>
    <div class="cards">
      <article class="card">
        <div class="card-img" style="background-image:url('cat-bowls.jpg')"></div>
        <h3 class="card-label">Bowls</h3>
      </article>
      <article class="card">
        <div class="card-img" style="background-image:url('cat-wraps.jpg')"></div>
        <h3 class="card-label">Wraps</h3>
      </article>
      <article class="card">
        <div class="card-img" style="background-image:url('cat-beverages.jpg')"></div>
        <h3 class="card-label">Beverages</h3>
      </article>
    </div>
  </section>
</main>
</body>
</html>
